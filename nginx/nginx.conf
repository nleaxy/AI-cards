server {
    # Nginx listens on port 80 inside the container
    listen 80;
    server_name localhost;

    # Proxy API requests to the Flask backend
    location /api/ {
        proxy_pass http://backend:5000/api/; # 'backend' corresponds to the Docker Compose service name
        
        # Forward client IP addresses and headers for upstream server logging/auth
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy all other requests to the React frontend
    location / {
        proxy_pass http://frontend:80/; # 'frontend' corresponds to the Docker Compose service name
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
