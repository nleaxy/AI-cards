# Declare the list of services (containers) that compose the project
services:

  nginx:
    build:
      context: ./nginx # Use Dockerfile from nginx directory
    ports:
      - "3080:80" # Expose port 3080 externally and map to port 80 inside the container
    depends_on:
      - frontend # Wait for frontend and backend to start
      - backend
    restart: unless-stopped # Automatically restart container on failure

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    env_file:
      - .env # Load environment variables from the .env file (git ignored)
    volumes:
      - backend_uploads:/app/uploads # Persist uploaded files on host disk
    healthcheck:
      # Check if backend is alive: try to request the API docs endpoint every 15 seconds
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/docs')"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      db:
        condition: service_healthy # Start backend ONLY when the database signals it is ready/healthy
      minio:
        condition: service_healthy # Start backend ONLY when MinIO is ready/healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine # Use lightweight Postgres image
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin} # DB user (defaults to 'admin' if not set in .env)
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_password} # DB password
      POSTGRES_DB: ${POSTGRES_DB:-study_cards} # Database name
    volumes:
      - pg_data:/var/lib/postgresql/data # Persist database data on host disk
    healthcheck:
      # Check if database is ready to accept connections
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-study_cards}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin} # MinIO admin username
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin} # MinIO admin password
    ports:
      - "9000:9000" # API port
      - "9001:9001" # Web console port
    volumes:
      - minio_data:/data # Persist uploaded files and objects securely
    healthcheck:
      # Check MinIO health via its live health check endpoint
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

# Register persistent volumes
volumes:
  pg_data:
  minio_data:
  backend_uploads:
